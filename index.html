<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta name="theme-color" content="#07111F">
<title>TBR indisponible</title>
<style>
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;color:#fff;background:linear-gradient(160deg,#07111f,#020617)}
.card{width:min(520px,100%);padding:32px 26px;border-radius:28px;text-align:center;background:rgba(15,23,42,.9);border:1px solid rgba(148,163,184,.18);box-shadow:0 24px 80px rgba(0,0,0,.45)}
.logo{width:82px;height:82px;margin:0 auto 20px;border-radius:24px;display:flex;align-items:center;justify-content:center;font-weight:1000;font-size:28px;background:linear-gradient(145deg,#0ea5e9,#4f46e5)}
h1{margin:0 0 12px;font-size:30px;line-height:1.05}p{margin:0;color:#cbd5e1;font-size:16px;line-height:1.5}
.status{margin-top:22px;padding:12px 14px;border-radius:16px;color:#fecaca;background:rgba(239,68,68,.10);border:1px solid rgba(248,113,113,.22);font-weight:800}
</style>
</head>
<body>
<main class="card">
<div class="logo">TBR</div>
<h1>Cette version de TBR n’est plus disponible.</h1>
<p>L’ancienne application a été désactivée.</p>
<div class="status">Accès bloqué</div>
</main>
<script>
(async()=>{
  try{
    if("serviceWorker" in navigator){
      const regs=await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r=>r.unregister()));
    }
  }catch(e){}
  try{
    if("caches" in window){
      const keys=await caches.keys();
      await Promise.all(keys.filter(k=>k.toLowerCase().startsWith("tbr")).map(k=>caches.delete(k)));
    }
  }catch(e){}
})();
</script>
</body>
</html>
