                      {c.code}<br/><span style={{fontSize:9,color:"#E8001D"}}>-{c.impact}€</span>
                    </button>
                  );
                })}
              </div>
            </div>
          </div>
          <SL label="Installation"/>
          <Tog label="Installation incluse" value={form.installation} onChange={v=>set("installation",v)} color="#2E7D32"/>
          <SL label="Statut"/>
          <Seg value={form.statut} options={["Vendu","Installe","En attente","Annule"]} labels={["Vendu","Installé","En attente","Annulé"]} onChange={v=>set("statut",v)}/>
          <div style={{background:"#FFF5F5",borderRadius:12,padding:14,border:"1px solid #FFCDD2",margin:"14px 0"}}>
            <div style={{fontSize:11,color:"#E8001D",fontWeight:700,marginBottom:10,textTransform:"uppercase"}}>Aperçu — IP: {(ip*100).toFixed(0)}%</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
              {[["Kit Start",preview.kit],["Bonus VD/VF",preview.bonus],["Packs (25%)",preview.packs],["Installation",preview.install],["Malus",preview.malus],["CA Packs",preview.caPacks]].map(([l,v])=>(
                <div key={l} style={{background:"#fff",borderRadius:8,padding:"8px 10px"}}>
                  <div style={{fontSize:9,color:"#8E8E93",fontWeight:500,marginBottom:2}}>{l}</div>
                  <div style={{fontWeight:700,fontSize:14,color:v<0?"#E8001D":l==="CA Packs"?"#1565C0":"#1C1C1E"}}>{fmt(v)}</div>
                </div>
              ))}
            </div>
            {preview.malusDetail&&preview.malusDetail.length>0&&(
              <div style={{background:"#FFEBEE",borderRadius:8,padding:"8px 10px",marginBottom:10}}>
                <div style={{fontSize:10,color:"#C62828",fontWeight:700,marginBottom:4}}>Détail malus :</div>
                {preview.malusDetail.map((d,i)=><div key={i} style={{fontSize:11,color:"#C62828"}}>• {d}</div>)}
              </div>
            )}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderTop:"1px solid #FFCDD2"}}>
              <span style={{fontWeight:700,color:"#E8001D",fontSize:14}}>TOTAL</span>
              <span style={{fontWeight:700,color:"#E8001D",fontSize:22}}>{fmt(preview.total)}</span>
            </div>
          </div>

          <button onClick={submit} style={{width:"100%",background:"#E8001D",color:"#fff",border:"none",borderRadius:14,padding:"14px",fontWeight:700,fontSize:15,cursor:"pointer",boxShadow:"0 4px 14px rgba(232,0,29,0.3)"}}>{editingId?"✓ Enregistrer les modifications":"✓ Enregistrer la vente"}</button>
        </Card>

  );

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {!editingId&&<button onClick={()=>{if(showForm){setShowForm(false);setEditingId(null);setEditPackId(null);setForm(newVente());}else{setForm(newVente());setEditingId(null);setEditPackId(null);setShowForm(true);}}} style={{background:"linear-gradient(135deg,#38bdf8,#6366f1)",color:"#fff",border:"1px solid rgba(255,255,255,.18)",borderRadius:18,padding:"14px",fontWeight:900,fontSize:15,cursor:"pointer",boxShadow:"0 16px 32px rgba(56,189,248,.18)",width:"100%"}}>
        {showForm?"✕  Annuler":"➕  Nouvelle vente"}
      </button>}
      {showForm&&!editingId&&renderSaleForm("Nouvelle vente")}
      <Card title={"Ventes - Nettes: "+ventes.filter(function(v){return !v.annulation;}).length+" / Total: "+ventes.length}>
        {/* RECHERCHE */}
        <div style={{position:"relative",marginBottom:10}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Rechercher un client..." style={{...INP,paddingLeft:12}}/>
          {search&&<button onClick={()=>setSearch("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",fontSize:16,color:"#8E8E93",cursor:"pointer"}}>✕</button>}
        </div>
        {/* FILTRES */}
        <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
          {[["tous","Tous"],["vd","VD"],["vf","VF"],["annule","Annulés"]].map(([k,l])=>(
            <button key={k} onClick={()=>setFiltre(k)} style={{padding:"5px 12px",borderRadius:20,border:"none",fontSize:11,fontWeight:600,background:filtre===k?"#E8001D":"#F2F2F7",color:filtre===k?"#fff":"#48484A",cursor:"pointer"}}>{l}</button>
          ))}
          <div style={{marginLeft:"auto",display:"flex",gap:6}}>
            {[["numDesc","N° ↓"],["numAsc","N° ↑"],["montant","💰"]].map(([k,l])=>(
              <button key={k} onClick={()=>setTri(k)} title={k==="numDesc"?"Numéro client décroissant":k==="numAsc"?"Numéro client croissant":"Montant"} style={{padding:"5px 10px",borderRadius:20,border:"none",fontSize:11,fontWeight:600,background:tri===k?"#1565C0":"#F2F2F7",color:tri===k?"#fff":"#48484A",cursor:"pointer"}}>{l}</button>
            ))}
          </div>
        </div>
        {ventes.length===0&&<div style={{color:"#8E8E93",textAlign:"center",padding:"24px 0",fontSize:13}}>Aucune vente. Appuyez sur ➕ pour commencer.</div>}
        {ventes.length>0&&ventesFiltrees.length===0&&<div style={{color:"#8E8E93",textAlign:"center",padding:"24px 0",fontSize:13}}>Aucun résultat.</div>}
        {ventesFiltrees.map(v=>{
          const r=calcCommission(v,ip);
          return(
            <React.Fragment key={v.id}>
            <div style={{padding:"12px 0",borderBottom:"1px solid #F2F2F7",opacity:v.annulation?0.45:1}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,fontSize:14,marginBottom:4}}>{v.nomClient||"Client sans nom"}</div>
                  <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:4}}>
                    <Tag color={v.typeVente==="VD"?"green":"blue"}>{v.typeVente}</Tag>
                    <Tag color="grey">{v.typeClient}</Tag>
                    <Tag color="grey">{v.engagement}m</Tag>
                    {v.remsc!=="Aucun"&&<Tag color="orange">{v.remsc}</Tag>}
                    {v.codePromo&&<Tag color="orange">{String(v.codePromo).toUpperCase()}</Tag>}
                    {v.annulation&&<Tag color="red">ANNULÉ {v.typeAnnulation?"("+v.typeAnnulation+")":""}  {v.numClientAnn?"#"+v.numClientAnn:""}</Tag>}
                  </div>
                  <div style={{fontSize:11,color:"#8E8E93"}}>{v.numClient?("N° client "+v.numClient):"N° client non renseigné"} · {v.packs.length} pack(s)</div>
                </div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6,marginLeft:8,flexShrink:0}}>
                  {!v.annulation&&<span style={{fontWeight:700,color:"#E8001D",fontSize:16}}>{fmt(r.total)}</span>}
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={()=>{setForm({...v});setEditPackId(null);setEditingId(v.id);setShowForm(true);setTimeout(()=>{const el=document.getElementById("edit-sale-"+v.id);if(el)el.scrollIntoView({behavior:"smooth",block:"nearest"});},80);}} style={{fontSize:11,background:"linear-gradient(135deg,#38bdf8,#6366f1)",border:"none",borderRadius:10,padding:"8px 11px",cursor:"pointer",color:"#fff",fontWeight:900,boxShadow:"0 10px 20px rgba(56,189,248,.18)"}}>✎</button>
                    {v.annulation?(
                      <button onClick={()=>setVentes(ventes.map(x=>x.id===v.id?{...x,annulation:false,typeAnnulation:"",numClientAnn:""}:x))} style={{fontSize:11,background:"#E8F5E9",border:"none",borderRadius:7,padding:"4px 8px",cursor:"pointer",color:"#2E7D32",fontWeight:600}}>Restaurer</button>
                    ):(
                      <button onClick={()=>{
                        const numC=prompt("N° client de la vente annulée (ex: 2122245):");
                        if(numC===null) return;
                        const typeA=prompt("Type d'annulation :\nAIMT (rétractation légale)\nAutre\n\nTapez : AIMT ou Autre");
                        if(typeA===null) return;
                        setVentes(ventes.map(x=>x.id===v.id?{...x,annulation:true,numClientAnn:numC.trim(),typeAnnulation:typeA.trim().toUpperCase()==="AIMT"?"AIMT":"Autre"}:x));
                      }} style={{fontSize:11,background:"#FFF3E0",border:"none",borderRadius:7,padding:"4px 8px",cursor:"pointer",color:"#E65100",fontWeight:600}}>Annuler</button>
                    )}
                    <button onClick={()=>setVentes(ventes.filter(x=>x.id!==v.id))} style={{fontSize:11,background:"#FFEBEE",border:"none",borderRadius:7,padding:"4px 8px",cursor:"pointer",color:"#E8001D",fontWeight:600}}>🗑</button>
                  </div>
                </div>
              </div>
            </div>
            {editingId===v.id&&showForm&&<div id={"edit-sale-"+v.id} style={{margin:"10px 0 18px",borderLeft:"3px solid rgba(56,189,248,.65)",paddingLeft:10}}>{renderSaleForm("✎ Modifier la vente")}</div>}
            </React.Fragment>
          );
        })}
      </Card>
    </div>
  );
}



function TendanceView({syn,mois,setMois,moisActif,agent,rdvVFMois,objectifPersoMois,objectifVentesMois,objectifVDMois,challengesTotal=0}){
  const status=(agent&&agent.statut)||"PLATINIUM";
  const [debut,setDebut]=useState(mois&&mois.debut?mois.debut:"");
  const [fin,setFin]=useState(mois&&mois.fin?mois.fin:"");
  const [typeMois,setTypeMois]=useState((mois&&mois.type)||"4 semaines");
  const [mode,setMode]=useState("ventes");
  const [selected,setSelected]=useState(null);

  const objectifV=objectifVentesMois||20;
  const objectifVD=objectifVDMois||12;
  const objectifCom=objectifPersoMois||Math.max(5000,Math.ceil((syn.grand||0)/500)*500);

  function parseLocalDate(v){
    if(!v) return null;
    const d=new Date(String(v).slice(0,10)+"T00:00:00");
    return isNaN(d.getTime())?null:d;
  }
  function iso(d){return d.toISOString().slice(0,10);}
  function clamp(n,min,max){return Math.max(min,Math.min(max,n));}
  function save(d,f,t){
    setDebut(d);setFin(f);setTypeMois(t);
    setMois({debut:d,fin:f,type:t});
  }
  function autoPeriod(kind){
    const start=new Date(moisActif.annee,moisActif.mois-1,1);
    const end=new Date(start);
    end.setDate(start.getDate()+(kind==="5 semaines"?34:27));
    save(iso(start),iso(end),kind);
  }
  function dayLabel(d){
    return d.toLocaleDateString("fr-FR",{weekday:"short",day:"2-digit",month:"short"}).replace(".", "");
  }
  function shortDay(d){
    return d.toLocaleDateString("fr-FR",{weekday:"short",day:"2-digit"}).replace(".", "");
  }
  function formatVal(v){
    if(mode==="commission") return fmt(Math.round(v||0));
    return Math.round(v||0);
  }

  let start=parseLocalDate(debut)||new Date(moisActif.annee,moisActif.mois-1,1);
  let end=parseLocalDate(fin)||new Date(moisActif.annee,moisActif.mois,0);
  if(end<start){start=new Date(moisActif.annee,moisActif.mois-1,1);end=new Date(moisActif.annee,moisActif.mois,0);}

  const today=new Date();
  const today0=new Date(today.getFullYear(),today.getMonth(),today.getDate());
  const totalDays=Math.max(1,Math.round((end-start)/86400000)+1);
  const dayIndex=today0<start?1:(today0>end?totalDays:clamp(Math.round((today0-start)/86400000)+1,1,totalDays));
  const remaining=Math.max(0,totalDays-dayIndex);

  const details=(syn.details||[]).filter(v=>!v.annulation);
  const days=Array.from({length:totalDays},(_,i)=>{
    const d=new Date(start);
    d.setDate(start.getDate()+i);
    return {
      date:d,
      label:dayLabel(d),
      short:shortDay(d),
      sales:0,
      vd:0,
      com:0,
      clients:[]
    };
  });

  details.forEach(v=>{
    const d=parseLocalDate(v.dateVente); 
    if(!d) return;
    const idx=Math.round((d-start)/86400000);
    if(idx>=0&&idx<totalDays){
      days[idx].sales+=1;
      if(v.typeVente==="VD") days[idx].vd+=1;
      days[idx].com+=v.result?(v.result.total||0):0;
      days[idx].clients.push(v.numClient?String(v.numClient):(v.nomClient||"Client"));
    }
  });

  let cSales=0,cVD=0,cCom=0;
  days.forEach((d,i)=>{
    cSales+=d.sales;
    cVD+=d.vd;
    cCom+=d.com;
    d.cumSales=cSales;
    d.cumVD=cVD;
    d.cumCom=Math.round((cCom+getPalierVentes(cSales)+getPalierVD(cVD)+getBonusSGP(status,cSales,cVD))*100)/100;
    if(i===days.length-1) d.cumCom=Math.max(d.cumCom,syn.grand||0);
  });

  const elapsed=Math.max(1,dayIndex);
  const projV=syn.vn?Math.round((syn.vn/elapsed)*totalDays):0;
  const projVD=syn.vd?Math.round((syn.vd/elapsed)*totalDays):0;
  const projCom=syn.grand?Math.round((syn.grand/elapsed)*totalDays):0;

  let mainKey="cumSales", dailyKey="sales", objectif=objectifV, projection=projV, label="Ventes cumulées", unit="";
  if(mode==="vd"){mainKey="cumVD";dailyKey="vd";objectif=objectifVD;projection=projVD;label="VD cumulées";}
  if(mode==="commission"){mainKey="cumCom";dailyKey="com";objectif=objectifCom;projection=projCom;label="Commission cumulée";unit="€";}

  const W=Math.max(1040,totalDays*62);
  const H=430;
  const L=78;
  const R=36;
  const T=32;
  const B=88;
  const chartW=W-L-R;
  const chartH=H-T-B;
  const xFor=i=>L+(totalDays<=1?0:(i/(totalDays-1))*chartW);
  const maxDaily=Math.max(1,...days.map(d=>Number(d[dailyKey])||0));
  const maxY=Math.max(1,objectif||0,projection||0,...days.map(d=>Number(d[mainKey])||0));
  const yFor=v=>T+chartH-(Math.max(0,Number(v)||0)/maxY)*chartH;
  const actualPts=days.map((d,i)=>xFor(i).toFixed(1)+","+yFor(d[mainKey]).toFixed(1)).join(" ");
  const todayI=clamp(dayIndex-1,0,totalDays-1);
  const todayX=xFor(todayI);
  const actualToday=days[todayI]?Number(days[todayI][mainKey]||0):0;
  const projPts=todayX.toFixed(1)+","+yFor(actualToday).toFixed(1)+" "+(L+chartW).toFixed(1)+","+yFor(projection).toFixed(1);
  const targetPts=days.map((d,i)=>{
    const target=(objectif||0)*((i+1)/totalDays);
    return xFor(i).toFixed(1)+","+yFor(target).toFixed(1);
  }).join(" ");
  const yTicks=[0,.25,.5,.75,1].map(p=>Math.round(maxY*p));
  const selectedDay=selected!==null&&days[selected]?days[selected]:days[todayI];
  const weekChunks=[];
  for(let i=0;i<days.length;i+=7){
    const chunk=days.slice(i,i+7);
    weekChunks.push({
      idx:Math.floor(i/7)+1,
      sales:chunk.reduce((s,d)=>s+d.sales,0),
      vd:chunk.reduce((s,d)=>s+d.vd,0),
      com:chunk.reduce((s,d)=>s+d.com,0)
    });
  }
  const bestDay=days.reduce((best,d,i)=>(d.sales>best.sales?{...d,idx:i}:best),{sales:0,vd:0,com:0,idx:0,label:"—"});
  const needPerDay=Math.max(0,(objectifV-syn.vn)/Math.max(1,remaining));
  const rate=syn.vn/elapsed;
  const perfVsTarget=(syn.vn-((objectifV*dayIndex)/totalDays));

  return(
    <div className="terminal-page">
      <section className="terminal-header">
        <div>
          <div className="terminal-eyebrow">Terminal commercial</div>
          <h2>Mois commercial piloté au jour exact</h2>
          <p>{start.toLocaleDateString("fr-FR",{weekday:"long",day:"2-digit",month:"long"})} → {end.toLocaleDateString("fr-FR",{weekday:"long",day:"2-digit",month:"long",year:"numeric"})}</p>
        </div>
        <div className="terminal-day">
          <span>Aujourd’hui</span>
          <b>J{dayIndex}/{totalDays}</b>
          <small>{remaining} jour(s) restant(s)</small>
        </div>
      </section>

      <section className="terminal-card terminal-period">
        <div className="terminal-card-head">
          <div>
            <div className="terminal-title">Période commerciale</div>
            <div className="terminal-sub">Calibrage utilisé par le graphique</div>
          </div>
          <div className="terminal-actions">
            <button onClick={()=>autoPeriod("4 semaines")} className={typeMois==="4 semaines"?"active":""}>4 semaines</button>
            <button onClick={()=>autoPeriod("5 semaines")} className={typeMois==="5 semaines"?"active":""}>5 semaines</button>
          </div>
        </div>
        <div className="terminal-date-grid">
          <label><span>Début</span><input type="date" value={debut} onChange={e=>save(e.target.value,fin,typeMois)}/></label>
          <label><span>Fin</span><input type="date" value={fin} onChange={e=>save(debut,e.target.value,typeMois)}/></label>
        </div>
      </section>

      <section className="terminal-card terminal-kpis">
        <div><span>Ventes</span><b>{syn.vn}</b><small>objectif {objectifV} · projection {projV}</small></div>
        <div><span>VD</span><b>{syn.vd}</b><small>objectif {objectifVD} · projection {projVD}</small></div>
        <div><span>Commission</span><b>{fmt(syn.grand)}</b><small>projection {fmt(projCom)}</small></div>
        <div><span>Rythme</span><b>{rate.toFixed(2)}</b><small>besoin {needPerDay.toFixed(2)} vente/jour</small></div>
      </section>

      <section className="terminal-card terminal-master">
        <div className="terminal-card-head">
          <div>
            <div className="terminal-title">{label}</div>
            <div className="terminal-sub">Réel · objectif progressif · projection · barres du jour</div>
          </div>
          <div className="terminal-mode">
            <button onClick={()=>setMode("ventes")} className={mode==="ventes"?"active":""}>Ventes</button>
            <button onClick={()=>setMode("vd")} className={mode==="vd"?"active":""}>VD</button>
            <button onClick={()=>setMode("commission")} className={mode==="commission"?"active":""}>Commission</button>
          </div>
        </div>

        <div className="terminal-legend">
          <span><i className="real"></i> Réel</span>
          <span><i className="target"></i> Objectif</span>
          <span><i className="proj"></i> Projection</span>
          <span><i className="bar"></i> Barres du jour</span>
        </div>

        <div className="terminal-scroll">
          <svg className="terminal-svg" viewBox={"0 0 "+W+" "+H} style={{width:W,height:H}}>
            <defs>
              <linearGradient id="terminalFill" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="rgba(56,189,248,.28)"/>
                <stop offset="100%" stopColor="rgba(56,189,248,0)"/>
              </linearGradient>
              <filter id="terminalGlow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="3" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>

            <rect x="0" y="0" width={W} height={H} rx="22" className="terminal-bg"/>
            <line x1={L} y1={T} x2={L} y2={T+chartH} className="terminal-axis"/>
            <line x1={L} y1={T+chartH} x2={L+chartW} y2={T+chartH} className="terminal-axis"/>

            {yTicks.map((tick,idx)=>(
              <g key={"y"+idx}>
                <line x1={L} x2={L+chartW} y1={yFor(tick)} y2={yFor(tick)} className="terminal-grid-line"/>
                <text x={L-14} y={yFor(tick)+4} textAnchor="end" className="terminal-y-label">{mode==="commission"?fmt(tick).replace(" €","€"):tick}</text>
              </g>
            ))}

            {days.map((d,i)=>(
              <g key={"d"+i} onClick={()=>setSelected(i)} className="terminal-day-zone">
                <line x1={xFor(i)} x2={xFor(i)} y1={T} y2={T+chartH} className={i===todayI?"terminal-today-grid":"terminal-day-grid"}/>
                <rect x={xFor(i)-8} y={T+chartH-(Math.max(0,Number(d[dailyKey])||0)/maxDaily)*64} width="16" height={(Math.max(0,Number(d[dailyKey])||0)/maxDaily)*64} rx="5" className={d[dailyKey]>0?"terminal-bar active":"terminal-bar"}/>
                <text x={xFor(i)} y={T+chartH+27} textAnchor="middle" className="terminal-x-day">{d.date.toLocaleDateString("fr-FR",{weekday:"short"}).replace(".","")}</text>
                <text x={xFor(i)} y={T+chartH+45} textAnchor="middle" className="terminal-x-date">{d.date.toLocaleDateString("fr-FR",{day:"2-digit",month:"short"}).replace(".","")}</text>
                {d.sales>0&&<circle cx={xFor(i)} cy={T+chartH+61} r="3.5" className="terminal-sale-dot"/>}
                <title>{d.label+" · "+d.sales+" vente(s) · "+d.vd+" VD · "+fmt(d.com)}</title>
              </g>
            ))}

            <polyline points={targetPts} fill="none" className="terminal-target"/>
            <polygon points={L+","+(T+chartH)+" "+actualPts+" "+(L+chartW)+","+(T+chartH)} className="terminal-area"/>
            <polyline points={actualPts} fill="none" className="terminal-line" filter="url(#terminalGlow)"/>
            <polyline points={projPts} fill="none" className="terminal-projection"/>

            <line x1={todayX} x2={todayX} y1={T} y2={T+chartH} className="terminal-today"/>
            <circle cx={todayX} cy={yFor(actualToday)} r="6" className="terminal-today-point"/>
            <text x={todayX+10} y={T+18} className="terminal-today-label">Aujourd’hui</text>
          </svg>
        </div>

        <div className="terminal-selected">
          <div>
            <span>Date sélectionnée</span>
            <b>{selectedDay?selectedDay.label:"—"}</b>
          </div>
          <div><span>Ventes jour</span><b>{selectedDay?selectedDay.sales:0}</b></div>
          <div><span>VD jour</span><b>{selectedDay?selectedDay.vd:0}</b></div>
          <div><span>Commission jour</span><b>{selectedDay?fmt(selectedDay.com):fmt(0)}</b></div>
          <div><span>N° clients</span><b>{selectedDay&&selectedDay.clients.length?selectedDay.clients.join(", "):"—"}</b></div>
        </div>
      </section>

      <section className="terminal-card terminal-weeks">
        <div className="terminal-card-head">
          <div>
            <div className="terminal-title">Lecture par semaine</div>
            <div className="terminal-sub">Résumé automatique de ton mois commercial</div>
          </div>
          <div className={perfVsTarget>=0?"terminal-pill ok":"terminal-pill warn"}>{perfVsTarget>=0?"+":""}{perfVsTarget.toFixed(1)} vente vs rythme</div>
        </div>
        <div className="terminal-week-grid">
          {weekChunks.map(w=>(
            <div className="terminal-week" key={w.idx}>
              <span>S{w.idx}</span>
              <b>{w.sales} vente(s)</b>
              <small>{w.vd} VD · {fmt(w.com)}</small>
            </div>
          ))}
        </div>
        <div className="terminal-insights">
          <div><b>Meilleur jour</b><span>{bestDay.sales?bestDay.label+" · "+bestDay.sales+" vente(s)":"Aucune vente sur la période"}</span></div>
          <div><b>Projection</b><span>{projV} ventes · {projVD} VD · {fmt(projCom)} à fin de mois commercial</span></div>
          <div><b>Action</b><span>{projV>=objectifV?"Tu es sur un bon rythme : sécurise les installations et les VD.":"Priorité : "+Math.max(0,objectifV-syn.vn)+" vente(s) à aller chercher, soit "+needPerDay.toFixed(2)+" vente/jour."}</span></div>
        </div>
      </section>
    </div>
  );
}


function calcDcoLineCommission(caBase){
  return Math.round((caBase||0)*0.25*100)/100;
}


function DCOCheckView({agent,moisActif,aimt}){
  const [loading,setLoading]=useState(false);
  const [dcoData,setDcoData]=useState(null);
  const [erreur,setErreur]=useState(null);
  const [nomFichier,setNomFichier]=useState(null);
  const [moisDCO,setMoisDCO]=useState(moisActif||{annee:new Date().getFullYear(),mois:new Date().getMonth()+1});
  const fileRef=useRef();
  const ip=getIP(agent.ventesPrec||0);

  const pad=n=>String(n).padStart(2,"0");
  const money=n=>fmt(Number(n||0));
  const normNum=v=>String(v||"").replace(/\D/g,"");
  const toNum=v=>{
    if(v===undefined||v===null) return 0;
    const cleaned=String(v).replace(/[€\s]/g,"").replace(",",".");
    const n=parseFloat(cleaned);
    return isNaN(n)?0:n;
  };
  const round2=n=>Math.round((Number(n)||0)*100)/100;
  const monthKey=m=>`cc_ventes_${m.annee}_${pad(m.mois)}`;
  const loadAllSales=m=>LD(monthKey(m),[]);

  const ventesAll=useMemo(()=>loadAllSales(moisDCO),[moisDCO]);
  const ventesActives=ventesAll.filter(v=>!v.annulation);

  async function readPageLines(pdf,pageNo){
    const page=await pdf.getPage(pageNo);
    const tc=await page.getTextContent();
    const buckets={};
    tc.items.forEach(function(it){
      const s=String(it.str||"").trim();
      if(!s) return;
      const tr=it.transform||[0,0,0,0,0,0];
      const y=Math.round((tr[5]||0)/3)*3;
      const x=tr[4]||0;
      if(!buckets[y]) buckets[y]=[];
      buckets[y].push({x:x,str:s});
    });
    return Object.keys(buckets).map(Number).sort(function(a,b){return b-a;}).map(function(y){
      return buckets[y].sort(function(a,b){return a.x-b.x;}).map(function(i){return i.str;}).join(" ").replace(/\s+/g," ").trim();
    }).filter(Boolean);
  }

  function getFirst(text,regex){
    const m=text.match(regex);
    return m?toNum(m[1]):0;
  }

  function parseSummary(p1){
    const text=p1.replace(/\s+/g," ");
    const ventesMatches=[];
    let m;
    const rx=/Commission sur ventes\s*\(\d\)\s*(-?[\d\s,.]+)/gi;
    while((m=rx.exec(text))!==null) ventesMatches.push(toNum(m[1]));
    const monthMatch=text.match(/MOIS COMMERCIAL\s+(\d{4})-(\d{1,2})/i);
    return {
      moisDoc:monthMatch?{annee:Number(monthMatch[1]),mois:Number(monthMatch[2])}:null,
      vBrutes:getFirst(text,/Nombre de ventes brutes\s+(-?[\d\s,.]+)/i),
      annuls:getFirst(text,/Nombre d.?annulations\s+(-?[\d\s,.]+)/i),
      vNettes:getFirst(text,/Nombre de ventes nettes\s+(-?[\d\s,.]+)/i),
      comVentes:ventesMatches.length?ventesMatches[0]:0,
      comVentesTotal:ventesMatches.length?ventesMatches[ventesMatches.length-1]:0,
      comPacks:getFirst(text,/Commission sur packs\s*\(\d\)\s*(-?[\d\s,.]+)/i),
      comInstall:getFirst(text,/Commission sur installations\s+(-?[\d\s,.]+)/i),
      vDirectes:getFirst(text,/Nombre de ventes directes\s+(-?[\d\s,.]+)/i),
      palierVD:getFirst(text,/Prime palier sur ventes directes\s+(-?[\d\s,.]+)/i),
      palierV:getFirst(text,/Prime palier sur ventes totales\s+(-?[\d\s,.]+)/i),
      bonusSGP:getFirst(text,/Bonus\s+(?:SILVER|GOLD|PLATINIUM)[^0-9-]*(-?[\d\s,.]+)/i),
      totalDCO:getFirst(text,/TOTAL COMMISSIONS ET PRIMES\s+(-?[\d\s,.]+)/i)
    };
  }

  function parseClientRows(p2){
    const rows=[];
    const text=p2.replace(/\s+/g," ");
    const rowRx=/(-?1)\s+(\d{6,8})\s+(.{0,90}?)\s+(REFVD|REFVF|PURVD|PURVF|PREVD|PREVF|RMK|PURGU)\s+(?:(\d{1,2})\s*mois\s+)?(-?[\d]+(?:[,.]\d+)?)\s+(-?[\d]+(?:[,.]\d+)?)\s+(-?[\d]+(?:[,.]\d+)?)(?:\s+(ACQ\s*start|annulation_AIMT))?/gi;
    let m, seen={};
    while((m=rowRx.exec(text))!==null){
      const num=normNum(m[2]);
      if(!num||seen[num]) continue;
      seen[num]=true;
      rows.push({
        nb:Number(m[1]),
        num:num,
        nom:String(m[3]||"").replace(/TOTAL|ANNEXE.*$/gi,"").trim()||"Client",
        catpub:String(m[4]||"").toUpperCase(),
        engagement:m[5]?Number(m[5]):0,
        caPacks:toNum(m[6]),
        comVente:toNum(m[7]),
        comPacks:toNum(m[8]),
        offre:m[9]||"",
        isAnnulation:Number(m[1])<0 || /annulation/i.test(m[9]||"")
      });
    }
    return rows;
  }

  function parseInstallRows(p3){
    const installs={};
    const text=String(p3||"").replace(/\s+/g," ");
    const chunks=text.split(/(?=\b\d{6,8}\b)/g);
    chunks.forEach(function(chunk){
      const id=(chunk.match(/\b(\d{6,8})\b/)||[])[1];
      if(!id) return;
      const beforeOffer=chunk.split(/ACQ\s*start|annulation_AIMT/i)[0]||"";
      const nums=beforeOffer.match(/-?\d+(?:[,.]\d+)?/g)||[];
      if(nums.length>=2){
        installs[normNum(id)]=toNum(nums[nums.length-1]);
      }
    });
    return installs;
  }

  function buildAnalysis(summary,rows,installs,moisUsed){
    const all=loadAllSales(moisUsed);
    const active=all.filter(v=>!v.annulation);
    const cancelled=all.filter(v=>v.annulation);
    const aimtTotal=((aimt&&aimt.vd)||0)+((aimt&&aimt.vf)||0);
    const tbrBrutes=active.length+cancelled.length;
    const tbrNettes=cancelled.length?active.length:Math.max(0,active.length-aimtTotal);
    const tbrAnnuls=cancelled.length?-cancelled.length:(aimtTotal?-aimtTotal:0);
    const tbrVDBase=active.filter(v=>v.typeVente==="VD").length;
    const tbrVD=cancelled.length?tbrVDBase:Math.max(0,tbrVDBase-((aimt&&aimt.vd)||0));

    const byNum={};
    active.forEach(v=>{const n=normNum(v.numClient); if(n) byNum[n]=v;});
    const annByNum={};
    cancelled.forEach(v=>{
      const n=normNum(v.numClientAnn||v.numClient);
      if(n) annByNum[n]=v;
    });

    const analyses=rows.map(function(lc){
      const vente=byNum[lc.num];
      const ann=annByNum[lc.num];
      const installDCO=round2(installs[lc.num]||0);

      if(lc.isAnnulation){
        return {
          type:"annulation",
          num:lc.num,nom:lc.nom,catpub:lc.catpub,
          statut:ann?"ok":"warning",
          title:ann?"Annulation retrouvée":"Annulation DCO non retrouvée dans TBR",
          dco:0,tbr:0,ecart:0,sous:0,
          detail:ann?"Annulation présente côté TBR.":"Le DCO annule ce client, mais je ne trouve pas l'annulation correspondante dans tes saisies."
        };
      }

      if(!vente){
        const montantDCO=round2(lc.comVente+lc.comPacks+installDCO);
        return {
          type:"missing_tbr",
          num:lc.num,nom:lc.nom,catpub:lc.catpub,
          statut:"warning",
          title:"Client payé dans le DCO mais absent des saisies TBR",
          dco:montantDCO,tbr:0,ecart:montantDCO,sous:0,
          detail:"Impossible de vérifier le montant : ajoute ou corrige le numéro client dans TBR."
        };
      }

      const r=calcCommission(vente,ip);
      const kitTBR=round2((r.kit||0)+(r.bonus||0)+(r.malus||0));
      const packsTBR=round2(r.packs||0);
      const installTBR=round2(vente.installation?((r.install)||0):0);

      const ecKit=round2((lc.comVente||0)-kitTBR);
      const ecPacks=round2((lc.comPacks||0)-packsTBR);
      const ecInstall=round2(installDCO-installTBR);

      const sousPacks=ecPacks<-0.99?Math.abs(ecPacks):0;
      const sousInstall=ecInstall<-0.99?Math.abs(ecInstall):0;
      const sousKit=ecKit<-0.99?Math.abs(ecKit):0;
      const ecartTotal=round2(ecKit+ecPacks+ecInstall);
      const statut=(sousPacks+sousInstall+sousKit)>0?"danger":(Math.abs(ecartTotal)>=1?"warning":"ok");

      return {
        type:"matched",
        num:lc.num,nom:lc.nom,catpub:lc.catpub,vente:vente,
        statut:statut,
        title:statut==="ok"?"Conforme":"Écart détecté",
        dco:round2(lc.comVente+lc.comPacks+installDCO),
        tbr:round2(kitTBR+packsTBR+installTBR),
        ecart:ecartTotal,
        sous:sousPacks+sousInstall,
        sousKit:sousKit,
        lines:[
          {label:"Commission vente",dco:round2(lc.comVente),tbr:kitTBR,ecart:ecKit,niveau:"C — dépend du type client / engagement / saisie"},
          {label:"Packs",dco:round2(lc.comPacks),tbr:packsTBR,ecart:ecPacks,niveau:"B — basé sur les packs saisis"},
          {label:"Installation",dco:installDCO,tbr:installTBR,ecart:ecInstall,niveau:"A — contrôle fiable"}
        ],
        detail:"Comparaison faite avec tes saisies TBR du mois détecté."
      };
    });

    const palierVTbr=getPalierVentes(tbrNettes);
    const palierVDTbr=getPalierVD(tbrVD);
    const bonusTbr=getBonusSGP((agent&&agent.statut)||"PLATINIUM",tbrNettes,tbrVD);
    const installTbrTotal=round2(analyses.reduce((s,a)=>s+(a.lines?Number(a.lines[2].tbr||0):0),0));

    const globalRows=[
      {label:"Ventes brutes",dco:summary.vBrutes,tbr:tbrBrutes,ecart:summary.vBrutes-tbrBrutes,money:false,niveau:"Volume"},
      {label:"Annulations",dco:summary.annuls,tbr:tbrAnnuls,ecart:summary.annuls-tbrAnnuls,money:false,niveau:"Volume"},
      {label:"Ventes nettes",dco:summary.vNettes,tbr:tbrNettes,ecart:summary.vNettes-tbrNettes,money:false,niveau:"Volume"},
      {label:"Ventes directes",dco:summary.vDirectes,tbr:tbrVD,ecart:summary.vDirectes-tbrVD,money:false,niveau:"Volume"},
      {label:"Palier ventes",dco:summary.palierV,tbr:palierVTbr,ecart:round2(summary.palierV-palierVTbr),money:true,niveau:"A"},
      {label:"Palier VD",dco:summary.palierVD,tbr:palierVDTbr,ecart:round2(summary.palierVD-palierVDTbr),money:true,niveau:"A"},
      {label:"Bonus SGP",dco:summary.bonusSGP,tbr:bonusTbr,ecart:round2(summary.bonusSGP-bonusTbr),money:true,niveau:"A"},
      {label:"Installations total",dco:summary.comInstall,tbr:installTbrTotal,ecart:round2(summary.comInstall-installTbrTotal),money:true,niveau:"A"}
    ];

    const sousClients=round2(analyses.reduce((s,a)=>s+(a.sous||0),0));
    const sousKit=round2(analyses.reduce((s,a)=>s+(a.sousKit||0),0));
    const sousGlobal=round2(globalRows.filter(r=>r.money&&r.label!=="Installations total").reduce((s,r)=>s+(r.ecart<0?Math.abs(r.ecart):0),0));
    const nonRetrouves=analyses.filter(a=>a.type==="missing_tbr").length;
    const anomalies=analyses.filter(a=>a.statut==="danger").length+globalRows.filter(r=>Math.abs(r.ecart)>=1).length+nonRetrouves;

    return {
      ...summary,
      moisUsed:moisUsed,
      rows:rows,
      analyses:analyses,
      globalRows:globalRows,
      sousPayeCalculable:round2(sousClients+sousGlobal),
      sousPayeKitAControler:sousKit,
      nonRetrouves:nonRetrouves,
      anomalies:anomalies,
      couverture:rows.filter(r=>!r.isAnnulation).length?Math.round(((rows.filter(r=>!r.isAnnulation).length-nonRetrouves)/rows.filter(r=>!r.isAnnulation).length)*100):0
    };
  }

  const parseDCO=async(file)=>{
    setLoading(true);setErreur(null);setDcoData(null);
    try{
      if(!window.pdfjsLib) throw new Error("Lecteur PDF non chargé. Vérifie ta connexion internet puis réessaie.");
      pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      const buf=await file.arrayBuffer();
      const pdf=await pdfjsLib.getDocument({data:buf}).promise;
      const p1Lines=pdf.numPages>=1?await readPageLines(pdf,1):[];
      const p2Lines=pdf.numPages>=2?await readPageLines(pdf,2):[];
      const p3Lines=pdf.numPages>=3?await readPageLines(pdf,3):[];
      const p1=p1Lines.join(" ");
      const p2=p2Lines.join(" ");
      const p3=p3Lines.join(" ");
      const summary=parseSummary(p1);
      const moisUsed=summary.moisDoc||moisDCO;
      setMoisDCO(moisUsed);
      const rows=parseClientRows(p2);
      const installs=parseInstallRows(p3);

      const sumComVentes=round2(rows.reduce((s,r)=>s+(r.comVente||0),0));
      const sumComPacks=round2(rows.reduce((s,r)=>s+(r.comPacks||0),0));
      const sumInstalls=round2(Object.values(installs).reduce((s,v)=>s+(Number(v)||0),0));
      if(sumComVentes) summary.comVentes=sumComVentes;
      if(sumComPacks) summary.comPacks=sumComPacks;
      if(sumInstalls) summary.comInstall=sumInstalls;

      if(!summary.moisDoc) throw new Error("Je n'ai pas trouvé le MOIS COMMERCIAL dans le PDF.");
      if(!rows.length) throw new Error("Je n'ai pas réussi à lire les lignes clients du DCO. Le format du PDF est peut-être différent.");

      const analysed=buildAnalysis(summary,rows,installs,moisUsed);
      setDcoData(analysed);
    }catch(e){
      setErreur("Analyse DCO impossible : "+(e&&e.message?e.message:e));
    }finally{
      setLoading(false);
    }
  };

  const VerdictBadge=({statut})=>{
    const cfg=statut==="ok"?["#E8F5E9","#087443","✓"]:statut==="danger"?["#FEE2E2","#B42318","!"]:["#FFF7E6","#B54708","?"];
    return <span className="dco-badge" style={{background:cfg[0],color:cfg[1]}}>{cfg[2]}</span>;
  };

  return (
    <div className="dco-v9">
      <section className="dco-hero">
        <div className="dco-robot-real" aria-hidden="true">
          <div className="dco-ant"></div>
          <div className="dco-head"><span></span><span></span><i></i></div>
          <div className="dco-body"><b>TBR</b></div>
          <div className="dco-arm left"></div>
          <div className="dco-arm right"></div>
        </div>
        <div className="dco-hero-text">
          <div className="v8-eyebrow">Contrôle paie</div>
          <h2>Importe ton DCO, TBR détecte le mois et compare avec tes saisies.</h2>
          <p>Le contrôle sépare les écarts fiables, les packs et les commissions vente à vérifier.</p>
        </div>
      </section>

      <section className="dco-card">
        <div className="dco-upload-row">
          <div>
            <div className="dco-title">PDF DCO</div>
            <div className="dco-sub">{nomFichier?nomFichier:"Aucun fichier chargé"} · Mois actif : {MOIS_NOMS[moisDCO.mois-1]} {moisDCO.annee}</div>
          </div>
          <button className="dco-upload-btn" onClick={()=>fileRef.current.click()}>{nomFichier?"Remplacer":"Importer DCO"}</button>
          <input ref={fileRef} type="file" accept=".pdf" style={{display:"none"}} onChange={e=>{if(e.target.files&&e.target.files[0]){setNomFichier(e.target.files[0].name);parseDCO(e.target.files[0]);}}}/>
        </div>
        <div className="dco-mini-note">
          <b>{ventesActives.length} vente(s) TBR trouvée(s) pour {MOIS_NOMS[moisDCO.mois-1]} {moisDCO.annee}.</b>
          {moisActif && (moisActif.annee!==moisDCO.annee || moisActif.mois!==moisDCO.mois) && (
            <span className="dco-month-warn">Le DCO est sur {MOIS_NOMS[moisDCO.mois-1]} {moisDCO.annee}, mais l'en-tête de l'app peut afficher {MOIS_NOMS[moisActif.mois-1]} {moisActif.annee}. Pour voir les ventes, va dans Saisie puis utilise les flèches du mois.</span>
          )}
        </div>
      </section>

      {loading&&<section className="dco-card dco-loading">JUMPER analyse ton PDF et croise avec tes ventes...</section>}
      {erreur&&<section className="dco-card dco-error">{erreur}</section>}

      {dcoData&&(
        <>
          <section className="dco-verdict">
            <div className="dco-verdict-main">
              <span>Verdict</span>
              <strong>{dcoData.anomalies>0?"Contrôle à vérifier":"DCO conforme"}</strong>
              <small>DCO détecté : {MOIS_NOMS[dcoData.moisUsed.mois-1]} {dcoData.moisUsed.annee} · {dcoData.couverture}% des clients DCO retrouvés dans TBR</small>
            </div>
            <div className="dco-verdict-side">
              <div><b>{dcoData.anomalies}</b><span>alertes</span></div>
              <div><b>{money(dcoData.sousPayeKitAControler)}</b><span>écarts à vérifier</span></div>
            </div>
          </section>

          <section className="dco-grid">
            <div className="dco-card">
              <div className="dco-title">Synthèse DCO</div>
              {[
                ["Ventes brutes",dcoData.vBrutes,false],
                ["Annulations",dcoData.annuls,false],
                ["Ventes nettes",dcoData.vNettes,false],
                ["Com. ventes",dcoData.comVentes,true],
                ["Com. packs",dcoData.comPacks,true],
                ["Installations",dcoData.comInstall,true],
                ["Palier ventes",dcoData.palierV,true],
                ["Palier VD",dcoData.palierVD,true],
                ["Total DCO",dcoData.totalDCO,true]
              ].map((r,i)=>(
                <div className="dco-line" key={i}><span>{r[0]}</span><b>{r[2]?money(r[1]):r[1]}</b></div>
              ))}
            </div>

            <div className="dco-card">
              <div className="dco-title">Écarts globaux</div>
              {dcoData.globalRows.map((r,i)=>{
                const bad=Math.abs(r.ecart)>=1;
                return (
                  <div className={"dco-line "+(bad?"bad":"")} key={i}>
                    <span>{r.label}<em>{r.niveau}</em></span>
                    <b>{r.money?money(r.dco):r.dco} / {r.money?money(r.tbr):r.tbr}</b>
                  </div>
                );
              })}
            </div>
          </section>

          {dcoData.nonRetrouves>0&&(
            <section className="dco-card dco-warning">
              <b>{dcoData.nonRetrouves} client(s) du DCO ne sont pas retrouvés dans tes saisies TBR.</b>
              <span>Corrige le numéro client dans TBR ou ajoute la vente. Sans numéro exact, l'app ne peut pas sécuriser le contrôle.</span>
            </section>
          )}

          <section className="dco-card">
            <div className="dco-title">Contrôle client par client</div>
            <div className="dco-sub">Chaque ligne DCO est comparée au numéro client saisi dans TBR.</div>
            <div className="dco-clients">
              {dcoData.analyses.map((a,i)=>(
                <details className={"dco-client "+a.statut} key={i} open={a.statut==="danger"||a.type==="missing_tbr"}>
                  <summary>
                    <VerdictBadge statut={a.statut==="danger"?"danger":a.statut==="ok"?"ok":"warning"}/>
                    <div><strong>{a.nom}</strong><span>N° {a.num} · {a.catpub} · {a.title}</span></div>
                    <b>{a.type==="matched"?money(a.ecart):money(a.dco)}</b>
                  </summary>
                  <p>{a.detail}</p>
                  {a.lines&&a.lines.map((l,j)=>(
                    <div className={"dco-detail-line "+(Math.abs(l.ecart)>=1?"bad":"")} key={j}>
                      <span>{l.label}<em>{l.niveau}</em></span>
                      <b>DCO {money(l.dco)} · TBR {money(l.tbr)} · Écart {money(l.ecart)}</b>
                    </div>
                  ))}
                </details>
              ))}
            </div>
          </section>
        </>
      )}
    </div>
  );
}


function ParamsView({agent,setAgent,mois,setMois,challenges,setChallenges,aimt,setAimt,rdvVFMois,setRdvVFMois,objectifPersoMois,setObjectifPersoMois,objectifVentesMois,setObjectifVentesMois,objectifVDMois,setObjectifVDMois}){
  const setA=(k,v)=>setAgent({...agent,[k]:v});
  const vdTrim=(+agent.vdT1||0)+(+agent.vdT2||0);
  const addChall=()=>setChallenges([...challenges,{id:Date.now(),nom:"",montant:0}]);
  const updChall=(id,k,v)=>setChallenges(challenges.map(c=>c.id===id?{...c,[k]:v}:c));
  const delChall=(id)=>setChallenges(challenges.filter(c=>c.id!==id));
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <Card title="👤 Agent">
        <FR label="Prénom"><Inp value={agent.prenom} onChange={v=>setA("prenom",v)}/></FR>
      </Card>
      <Card title="⭐ Statut SGP">
        <FR label="Statut"><Seg value={agent.statut} options={["Aucun","SILVER","GOLD","PLATINIUM"]} onChange={v=>setA("statut",v)}/></FR>
      </Card>
      <Card title="📈 IP">
        <FR label="Ventes mois précédent"><input type="text" inputMode="numeric" pattern="[0-9]*" value={agent.ventesPrec??""} onChange={e=>{const v=e.target.value.replace(/[^0-9]/g,"");setA("ventesPrec",v===""?"":+v);}} style={INP}/></FR>
        <FR label="Objectif ventes"><input type="text" inputMode="numeric" pattern="[0-9]*" value={objectifVentesMois||""} onChange={e=>{const v=e.target.value.replace(/[^0-9]/g,"");setObjectifVentesMois(v===""?0:+v);}} placeholder="Ex: 10" style={INP}/></FR>
        <FR label="Objectif VD"><input type="text" inputMode="numeric" pattern="[0-9]*" value={objectifVDMois||""} onChange={e=>{const v=e.target.value.replace(/[^0-9]/g,"");setObjectifVDMois(v===""?0:+v);}} placeholder="Ex: 6" style={INP}/></FR>
        <FR label="RDV VF reçus"><input type="text" inputMode="numeric" pattern="[0-9]*" value={rdvVFMois??""} onChange={e=>{const v=e.target.value.replace(/[^0-9]/g,"");setRdvVFMois(v===""?0:+v);}} style={INP}/></FR>
        <div style={{background:"#FFF5F5",borderRadius:10,padding:14,marginTop:8,textAlign:"center",border:"1px solid #FFCDD2"}}>
          <div style={{fontSize:11,color:"#8E8E93",marginBottom:4}}>IP appliqué</div>
          <div style={{fontSize:36,fontWeight:700,color:"#E8001D"}}>{(getIP(agent.ventesPrec||0)*100).toFixed(0)}%</div>
          <div style={{fontSize:11,color:"#8E8E93",marginTop:4}}>0→40% · 1→50% · 2→60% · 3→70% · 4→80% · 5→90% · 6+→100%</div>
        </div>
      </Card>
      <Card title="⚠️ Ventes AIMT / ALIT / ASAT">
        <div style={{background:"#FFF3E0",borderRadius:10,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#E65100",lineHeight:1.6}}>
          Annulations imposées (impayé total, litige…) sur des ventes d'anciens mois. Elles réduisent vos compteurs et paliers du mois en cours.
        </div>
        <FR label="Annulations VD"><input type="text" inputMode="numeric" pattern="[0-9]*" value={aimt.vd??""} onChange={e=>{const v=e.target.value.replace(/[^0-9]/g,"");setAimt({...aimt,vd:v===""?0:+v});}} style={INP}/></FR>
        <FR label="Annulations VF"><input type="text" inputMode="numeric" pattern="[0-9]*" value={aimt.vf??""} onChange={e=>{const v=e.target.value.replace(/[^0-9]/g,"");setAimt({...aimt,vf:v===""?0:+v});}} style={INP}/></FR>
        {((aimt.vd||0)+(aimt.vf||0))>0&&(
          <div style={{background:"#FFEBEE",borderRadius:10,padding:"10px 12px",marginTop:8,fontSize:13,color:"#C62828",fontWeight:600}}>
            Impact : -{(aimt.vd||0)+(aimt.vf||0)} vente(s) nette(s) · -{aimt.vd||0} VD sur les paliers
          </div>
        )}
      </Card>
      <Card title="🎁 Challenges du mois">
        {challenges.map(c=>(
          <div key={c.id} style={{background:"#F2F2F7",borderRadius:10,padding:12,marginBottom:8}}>
            <FR label="Mission"><Inp value={c.nom} onChange={v=>updChall(c.id,"nom",v)} placeholder="Ex: Bonus VD semaine 1"/></FR>
            <FR label="Prime (€)"><input type="number" value={c.montant||0} onChange={e=>updChall(c.id,"montant",+e.target.value)} style={INP}/></FR>
            <button onClick={()=>delChall(c.id)} style={{width:"100%",background:"#FFEBEE",color:"#E8001D",border:"none",borderRadius:8,padding:"7px",fontWeight:600,fontSize:12,cursor:"pointer",marginTop:6}}>Supprimer</button>
          </div>
        ))}
        <button onClick={addChall} style={{width:"100%",background:"#F2F2F7",border:"1.5px dashed #C7C7CC",borderRadius:10,padding:"11px",color:"#8E8E93",fontSize:13,fontWeight:600,cursor:"pointer"}}>+ Ajouter un challenge</button>
        {challenges.length>0&&<div style={{marginTop:10,padding:"10px 0",borderTop:"1px solid #F2F2F7",display:"flex",justifyContent:"space-between"}}><span style={{fontSize:13,color:"#48484A"}}>Total challenges</span><span style={{fontSize:15,fontWeight:700,color:"#7B1FA2"}}>{fmt(challenges.reduce((s,c)=>s+(+c.montant||0),0))}</span></div>}
      </Card>

      

      

      {/* À PROPOS */}
      <Card title="À propos">
        <div style={{textAlign:"center",padding:"8px 0 12px"}}>
          <div style={{display:"inline-flex",padding:8,borderRadius:24,background:"linear-gradient(135deg,rgba(56,189,248,.16),rgba(99,102,241,.18))",border:"1px solid rgba(56,189,248,.24)",boxShadow:"0 18px 42px rgba(56,189,248,.16)",marginBottom:12}}>
            <img src={TBR_LOGO_IMG} alt="TBR" style={{width:78,height:78,borderRadius:22,display:"block",boxShadow:"0 12px 28px rgba(56,189,248,.18)",background:"#07111f"}}/>
          </div>
          <div style={{fontWeight:800,fontSize:18,color:"#f8fafc",marginBottom:4}}>TBR Commission</div>
          <div style={{fontSize:12,color:"#94a3b8",marginBottom:6}}>Version {APP_VERSION}</div>
          <div style={{fontSize:12,color:"#cbd5e1",lineHeight:1.7,marginBottom:16,maxWidth:320,marginLeft:"auto",marginRight:"auto"}}>
            Assistant de suivi des performances commerciales et des commissions. Les résultats restent indicatifs et ne constituent pas un document officiel.
          </div>

        </div>
      </Card>
    </div>
  );
}

function Card({title,children}){return(<div className="deck-card" style={{background:"linear-gradient(135deg,rgba(8,17,31,.94),rgba(15,23,42,.90))",borderRadius:24,overflow:"hidden",boxShadow:"0 22px 55px rgba(2,6,23,.26)",marginBottom:0,border:"1px solid rgba(148,163,184,.22)",color:"#e5eefb"}}>{title&&<div className="deck-card-title" style={{padding:"15px 16px",borderBottom:"1px solid rgba(148,163,184,.18)",fontWeight:900,fontSize:12,letterSpacing:1.1,textTransform:"uppercase",color:"#38bdf8",background:"rgba(255,255,255,.035)"}}>{title}</div>}<div style={{padding:"16px"}}>{children}</div></div>);}
function SL({label}){return <div className="deck-section-label" style={{fontSize:11,fontWeight:950,color:"#38bdf8",letterSpacing:1.1,textTransform:"uppercase",margin:"16px 0 9px"}}>{label}</div>;}
function FR({label,children}){return(<div className="deck-field-row" style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,marginBottom:12}}><label style={{fontSize:13,color:"#cbd5e1",fontWeight:750,flex:"0 0 auto",maxWidth:"42%",lineHeight:1.3}}>{label}</label><div style={{flex:1,minWidth:0}}>{children}</div></div>);}
function Inp({value,onChange,placeholder}){return <input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder||""} style={INP}/>;}
function Sel({value,options,labels,onChange}){return(<div style={{position:"relative"}}><select value={value} onChange={e=>onChange(e.target.value)} style={{...INP,paddingRight:28}}>{options.map((o,i)=><option key={o} value={o}>{(labels&&labels[i])||o}</option>)}</select><div style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",pointerEvents:"none",fontSize:10,color:"#94a3b8"}}>▼</div></div>);}
function Seg({value,options,labels,onChange}){return(<div className="deck-seg" style={{display:"flex",background:"rgba(2,6,23,.42)",borderRadius:14,padding:4,gap:3,border:"1px solid rgba(148,163,184,.16)"}}>{options.map((o,i)=>(<button key={o} onClick={()=>onChange(o)} style={{flex:1,padding:"9px 5px",border:"none",borderRadius:11,fontSize:11,fontWeight:value===o?900:650,background:value===o?"linear-gradient(135deg,#38bdf8,#6366f1)":"transparent",color:value===o?"#fff":"#cbd5e1",cursor:"pointer",transition:"all 0.15s",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{(labels&&labels[i])||o}</button>))}</div>);}
function Tog({label,value,onChange,color="#38bdf8"}){return(<div className="deck-toggle-row" style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 0",borderBottom:"1px solid rgba(148,163,184,.12)",marginBottom:4}}><span style={{fontSize:13,color:"#cbd5e1",flex:1,marginRight:10,lineHeight:1.3,fontWeight:700}}>{label}</span><div onClick={()=>onChange(!value)} style={{width:46,height:27,background:value?"linear-gradient(135deg,#38bdf8,#6366f1)":"rgba(148,163,184,.22)",borderRadius:14,position:"relative",cursor:"pointer",transition:"background 0.2s",flexShrink:0,border:"1px solid rgba(255,255,255,.12)"}}><div style={{position:"absolute",top:3,left:value?21:3,width:21,height:21,background:"#fff",borderRadius:11,boxShadow:"0 1px 6px rgba(0,0,0,0.35)",transition:"left 0.2s"}}/></div></div>);}
function Tag({color,children}){const C={red:{bg:"rgba(248,113,113,.16)",t:"#fecaca",b:"rgba(248,113,113,.28)"},green:{bg:"rgba(16,185,129,.16)",t:"#a7f3d0",b:"rgba(16,185,129,.28)"},blue:{bg:"rgba(56,189,248,.16)",t:"#bae6fd",b:"rgba(56,189,248,.28)"},grey:{bg:"rgba(148,163,184,.16)",t:"#cbd5e1",b:"rgba(148,163,184,.22)"},orange:{bg:"rgba(251,191,36,.16)",t:"#fde68a",b:"rgba(251,191,36,.28)"}};const c=C[color]||C.grey;return <span style={{background:c.bg,color:c.t,border:"1px solid "+c.b,borderRadius:7,padding:"2px 7px",fontSize:10,fontWeight:850,whiteSpace:"nowrap"}}>{children}</span>;}
const INP={background:"rgba(2,6,23,.45)",border:"1px solid rgba(148,163,184,.22)",borderRadius:12,color:"#f8fafc",fontSize:13,padding:"10px 12px",width:"100%",outline:"none",boxSizing:"border-box"};

ReactDOM.render(<App/>,document.getElementById("root"));
</script>


<script id="tbr-v8-scroll-guard">
(function(){
  function unlock(){
    document.documentElement.style.overflowY = "auto";
    document.documentElement.style.height = "auto";
    document.body.style.overflowY = "auto";
    document.body.style.height = "auto";
    document.body.style.position = "static";
    var root=document.getElementById("root");
    if(root){root.style.height="auto";root.style.overflow="visible";}
    var shell=document.querySelector(".tbr-shell");
    if(shell){
      shell.style.height="auto";
      shell.style.maxHeight="none";
      shell.style.overflow="visible";
      shell.style.position="relative";
    }
  }
  window.addEventListener("load", unlock);
  document.addEventListener("DOMContentLoaded", unlock);
  setTimeout(unlock,300);
  setTimeout(unlock,1200);
})();
</script>

</body>
</html>
